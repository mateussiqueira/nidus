version: '3.8'

# ============================================
# STACKRUN - Production Docker Compose
# ============================================

services:
  # ============================================
  # Caddy - Reverse Proxy with Auto-TLS
  # ============================================
  caddy:
    image: caddy:2-alpine
    container_name: stackrun-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./logs/caddy:/var/log/caddy
    networks:
      - stackrun-network
    depends_on:
      - api
      - dashboard
      - proxy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: stackrun-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stackrun_production
      POSTGRES_USER: ${POSTGRES_USER:-nidus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - stackrun-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nidus} -d stackrun_production"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: stackrun-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --protected-mode yes
      --rename-command FLUSHDB ""
      --rename-command FLUSHALL ""
      --rename-command DEBUG ""
    volumes:
      - redis_data:/data
    networks:
      - stackrun-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_setid:
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Go API Server
  # ============================================
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: stackrun-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-nidus}:${POSTGRES_PASSWORD}@postgres:5432/stackrun_production?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://stackrun.vercel.app,https://www.stackrun.vercel.app}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./logs/api:/app/logs
    networks:
      - stackrun-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "api"

  # ============================================
  # Go Deploy Worker
  # ============================================
  worker:
    build:
      context: ./workers/deploy
      dockerfile: Dockerfile
      target: production
    container_name: stackrun-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nidus}:${POSTGRES_PASSWORD}@postgres:5432/stackrun_production?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DOCKER_HOST: unix:///var/run/docker.sock
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - deploy_data:/app/data
      - ./logs/worker:/app/logs
    networks:
      - stackrun-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "worker"

  # ============================================
  # User Apps Proxy
  # ============================================
  proxy:
    build:
      context: ./apps/proxy
      dockerfile: Dockerfile
      target: production
    container_name: stackrun-proxy
    restart: unless-stopped
    ports:
      - "3080:3080"
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - stackrun-network
    depends_on:
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "proxy"

  # ============================================
  # Dashboard (Next.js)
  # ============================================
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
      target: production
    container_name: stackrun-dashboard
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://stackrun.vercel.app}
      API_URL: http://api:3001
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      - ./logs/dashboard:/app/logs
    networks:
      - stackrun-network
    depends_on:
      api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "dashboard"

# ============================================
# Networks
# ============================================
networks:
  stackrun-network:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/stackrun/data/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/stackrun/data/redis
  deploy_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/stackrun/data/deploys
  caddy_data:
    driver: local
  caddy_config:
    driver: local

# ============================================
# Security
# ============================================
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
