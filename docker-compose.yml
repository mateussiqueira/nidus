services:
  postgres:
    image: postgres:16-alpine
    container_name: nidus-postgres
    environment:
      POSTGRES_USER: broto
      POSTGRES_PASSWORD: broto
      POSTGRES_DB: nidus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U broto"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nidus-redis
    command: redis-server --requirepass nidus-redis-pass
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "nidus-redis-pass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nidus-api
    environment:
      DATABASE_URL: "postgresql://broto:broto@postgres:5432/nidus"
      REDIS_URL: "redis://:nidus-redis-pass@redis:6379"
      JWT_SECRET: "local_nidus_jwt_secret_change_me"
      API_PORT: "3001"
      CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: workers/deploy/Dockerfile
    container_name: nidus-worker
    environment:
      DATABASE_URL: "postgresql://broto:broto@postgres:5432/nidus"
      REDIS_URL: "redis://:nidus-redis-pass@redis:6379"
      NIDUS_HOST: "localhost"
      NIDUS_DEPLOYS_DIR: "/tmp/nidus-deploys"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - deploy-data:/tmp/nidus-deploys
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  proxy:
    build:
      context: .
      dockerfile: apps/proxy/Dockerfile
    container_name: nidus-proxy
    environment:
      PROXY_PORT: "3080"
    ports:
      - "3080:3080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  deploy-data:
