name: nidus

services:
  postgres:
    image: postgres:16-alpine
    container_name: nidus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nidus
      POSTGRES_PASSWORD: nidus
      POSTGRES_DB: nidus
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nidus -d nidus"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - nidus-internal

  redis:
    image: redis:7-alpine
    container_name: nidus-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-nidus-redis-pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-nidus-redis-pass}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - nidus-internal

  minio:
    image: minio/minio:latest
    container_name: nidus-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nidus}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nidus-minio-pass-changeme}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - nidus-internal

  caddy:
    image: caddy:2-alpine
    container_name: nidus-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "2019:2019"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      NIDUS_ROOT_DOMAIN: ${NIDUS_ROOT_DOMAIN:-nidus.localhost}
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    networks:
      - nidus-internal

networks:
  nidus-internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
