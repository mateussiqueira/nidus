syntax = "proto3";
package nidus.mesh.v1;

service HealthService {
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
  rpc Watch(HealthWatchRequest) returns (stream HealthStatus);
}

message HealthCheckRequest { string service_name = 1; }
message HealthCheckResponse {
  string status = 1;
  string version = 2;
  int64 uptime_seconds = 3;
  int64 memory_mb = 4;
  int32 active_connections = 5;
}
message HealthWatchRequest { string service_name = 1; int32 interval_seconds = 2; }
message HealthStatus { string status = 1; string service = 2; int64 timestamp = 3; }
