<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c4954a"/>
      <stop offset="30%" stop-color="#deb76e"/>
      <stop offset="60%" stop-color="#c4954a"/>
      <stop offset="100%" stop-color="#a07530"/>
    </linearGradient>
    <linearGradient id="bristles" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#c4954a"/>
      <stop offset="100%" stop-color="#6b4c10"/>
    </linearGradient>
  </defs>

  <!-- Broom group rotated for dynamic angle -->
  <g transform="translate(100,100) rotate(-35) translate(-100,-100)">
    
    <!-- Handle shadow/outline -->
    <line x1="155" y1="55" x2="60" y2="155" stroke="rgba(0,0,0,0.15)" stroke-width="13" stroke-linecap="round"/>
    
    <!-- Handle (wood) -->
    <line x1="155" y1="55" x2="60" y2="155" stroke="url(#wood)" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Handle wood grain lines -->
    <line x1="150" y1="60" x2="148" y2="62" stroke="#a07530" stroke-width="0.8" opacity="0.5"/>
    <line x1="138" y1="73" x2="136" y2="75" stroke="#a07530" stroke-width="0.8" opacity="0.5"/>
    <line x1="125" y1="87" x2="123" y2="89" stroke="#a07530" stroke-width="0.8" opacity="0.5"/>
    <line x1="112" y1="101" x2="110" y2="103" stroke="#a07530" stroke-width="0.8" opacity="0.5"/>
    <line x1="145" y1="65" x2="143" y2="67" stroke="#deb76e" stroke-width="0.5" opacity="0.4"/>
    <line x1="130" y1="82" x2="128" y2="84" stroke="#deb76e" stroke-width="0.5" opacity="0.4"/>
    
    <!-- Golden "Nimbus" text area (simplified as a gold band) -->
    <rect x="125" y="78" width="22" height="6" rx="3" fill="#d4a017" opacity="0.8" transform="rotate(-45 136 81)"/>
    <text x="136" y="83" fill="#fff" font-size="4" font-weight="bold" font-family="serif" transform="rotate(-45 136 81)" opacity="0.9">2000</text>

    <!-- Binding rings -->
    <ellipse cx="68" cy="147" rx="8" ry="4" fill="#5a3a0a" transform="rotate(-45 68 147)"/>
    <ellipse cx="64" cy="151" rx="7" ry="3.5" fill="#4a2a00" transform="rotate(-45 64 151)"/>
    <ellipse cx="60" cy="155" rx="6.5" ry="3" fill="#3a1a00" transform="rotate(-45 60 155)"/>

    <!-- Bristles - outer layer -->
    <path d="M68 147 Q50 160 25 175" stroke="#6b4c10" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M66 149 Q45 164 18 180" stroke="#7a5a14" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M64 151 Q40 168 12 184" stroke="#6b4c10" stroke-width="2" stroke-linecap="round"/>
    <path d="M62 153 Q35 172 8 186" stroke="#8B6914" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M60 155 Q30 176 5 188" stroke="#6b4c10" stroke-width="2" stroke-linecap="round"/>

    <!-- Bristles - inner layer -->
    <path d="M68 147 Q55 158 35 165" stroke="#c4954a" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M66 149 Q52 160 30 168" stroke="#deb76e" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M64 151 Q48 162 25 172" stroke="#c4954a" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M62 153 Q44 164 20 176" stroke="#deb76e" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M60 155 Q40 166 15 180" stroke="#c4954a" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Bristles - highlight strands -->
    <path d="M66 149 Q53 156 40 162" stroke="#e8c870" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <path d="M62 153 Q48 160 33 168" stroke="#e8c870" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

    <!-- Footrest stirrup -->
    <path d="M64 140 L58 132 L52 140" stroke="#888" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Speed lines / motion trails -->
  <line x1="95" y1="25" x2="115" y2="15" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="100" y1="32" x2="125" y2="25" stroke="#4ade80" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="90" y1="20" x2="108" y2="8" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="88" y1="35" x2="110" y2="32" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Sparkles -->
  <circle cx="118" cy="12" r="2.5" fill="#22c55e" opacity="0.8"/>
  <circle cx="128" cy="22" r="2" fill="#4ade80" opacity="0.6"/>
  <circle cx="112" cy="6" r="1.5" fill="#22c55e" opacity="0.7"/>
  <circle cx="132" cy="16" r="1.2" fill="#4ade80" opacity="0.5"/>
  <circle cx="120" cy="30" r="1" fill="#22c55e" opacity="0.4"/>

  <!-- Small star sparkle -->
  <path d="M140 10 L141 13 L144 14 L141 15 L140 18 L139 15 L136 14 L139 13 Z" fill="#22c55e" opacity="0.7"/>
  <path d="M108 26 L108.5 28 L110 28.5 L108.5 29 L108 31 L107.5 29 L106 28.5 L107.5 28 Z" fill="#4ade80" opacity="0.5"/>
</svg>
